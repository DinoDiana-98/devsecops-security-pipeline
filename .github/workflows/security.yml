name: 🔒 Security Pipeline

# Se ejecuta en cada push y pull request a main
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      run_container_scan:
        description: 'Ejecutar escaneo de contenedor'
        type: boolean
        default: true

# Permisos necesarios para el pipeline
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ------------------------------------------------------------
  # JOB 1: Detección de Secretos
  # ------------------------------------------------------------
  secrets-scan:
    name: 🔍 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔐 Gitleaks - Detectar secretos expuestos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  # ------------------------------------------------------------
  # JOB 2: Análisis SAST (Static Application Security Testing) Pruebas de seguridad de aplicaciones estáticas
  # ------------------------------------------------------------
  sast-scan:
    name: 🛡️ SAST Analysis
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar herramientas de seguridad
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: 🔎 Bandit - Análisis de código Python
        run: |
          echo "🔍 Ejecutando Bandit (SAST)..."
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -f txt -o bandit-report.txt || true
          echo "✅ Escaneo Bandit completado"
      
      - name: 📋 Safety - Auditoría de dependencias
        run: |
          echo "📦 Verificando vulnerabilidades en dependencias..."
          pip freeze > installed-deps.txt
          safety check --file=installed-deps.txt --json --output safety-report.json || true
          echo "✅ Auditoría Safety completada"
      
      - name: 📤 Subir reportes como artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            bandit-report.txt
            safety-report.json
          retention-days: 30
  
  # ------------------------------------------------------------
  # JOB 3: Escaneo de Imagen Docker
  # ------------------------------------------------------------
  container-scan:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🏗️ Construir imagen Docker
        run: docker build -t devsecops-demo:${{ github.sha }} .
      
      - name: 🔬 Trivy - Escanear vulnerabilidades en imagen
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'devsecops-demo:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          timeout: '10m'
      
      - name: 📤 Subir resultados a Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container-scan'
      
      - name: 📊 Generar resumen de Trivy
        run: |
          echo "✅ Escaneo de contenedor completado"
          echo "📁 Reporte SARIF disponible en la pestaña Security"
  
  # ------------------------------------------------------------
  # JOB 4: Resumen Final
  # ------------------------------------------------------------
  summary:
    name: 📋 Pipeline Summary
    needs: [secrets-scan, sast-scan, container-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📊 Estado del Pipeline de Seguridad
        run: |
          echo "=============================================="
          echo "🔒 DEVSECOPS PIPELINE - REPORTE DE SEGURIDAD"
          echo "=============================================="
          echo ""
          echo "📌 Resultados:"
          echo "   🔍 Detección de secretos: ${{ needs.secrets-scan.result }}"
          echo "   🛡️ Análisis SAST:         ${{ needs.sast-scan.result }}"
          echo "   🐳 Escaneo de contenedor: ${{ needs.container-scan.result }}"
          echo ""
          echo "=============================================="
          echo "👩‍💻 Pipeline diseñado por: Leidy Diana Principe Quispe"
          echo "📧 Contacto: dprincipe.q@gmail.com"
          echo "🔗 LinkedIn: linkedin.com/in/leidy-diana-principe-quispe"
          echo "=============================================="
      
      - name: ✅ Verificación Final
        if: |
          needs.secrets-scan.result == 'success' || 
          needs.secrets-scan.result == 'skipped'
        run: |
          echo "✅ Pipeline completado exitosamente"
          echo "🎯 Proyecto: Portafolio de Ciberseguridad 2026"
